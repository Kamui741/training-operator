apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-operator
  labels:
    control-plane: kubeflow-training-operator
    app: training-operator
  namespace: hxz-cabt
spec:
  selector:
    matchLabels:
      control-plane: kubeflow-training-operator
  replicas: 1
  template:
    metadata:
      labels:
        control-plane: kubeflow-training-operator
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      containers:
        - command:
            - /manager
          image: kmu1/training-operator:latest  ############
          name: training-operator
          ports:
            - containerPort: 8080
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          env:
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MPI_KUBECTL_DELIVERY_IMAGE
              value: kmu1/kubectl-delivery:latest ##############
            - name: PYTORCH_INIT_CONTAINER_IMAGE
              value: alpine:3.10
            - name: PYTORCH_INIT_CONTAINER_TEMPLATE_FILE
              value: /etc/config/initContainer.yaml
            - name: PYTORCH_INIT_CONTAINER_MAX_TRIES
              value: "100"
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - mountPath: /tmp/k8s-webhook-server/serving-certs
              name: gencerts
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
      serviceAccountName: training-operator
      terminationGracePeriodSeconds: 10
      volumes:
        - name: gencerts
          secret:
            defaultMode: 420
            secretName: training-operator-webhook-cert
