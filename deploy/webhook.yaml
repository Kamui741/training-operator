---
# manifests.yaml 的内容
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
  # mpioperator 相关的 webhook 配置
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: system
        path: /validate-kubeflow-org-v1-mpioperator
    failurePolicy: Fail
    name: validator.mpioperator.training-operator.kubeflow.org
    rules:
      - apiGroups:
          - kubeflow.org
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - mpijobs
    sideEffects: None
  # 其他框架的 webhook 配置已被注释
